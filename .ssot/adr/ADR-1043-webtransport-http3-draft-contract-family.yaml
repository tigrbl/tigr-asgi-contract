body: |-
  Decision: tigr-asgi-contracts models WebTransport over HTTP/3 as a separate draft-target session, stream, and datagram contract family, not as generic HTTP/3 or WebSocket behavior.
  
  Owned boundary:
  - The contract may define WebTransport session, bidirectional stream, unidirectional stream, datagram, and close/reset/stop-sending event shapes.
  - The contract must mark this stack against the active IETF draft target until the draft becomes an RFC.
  
  Peer inputs:
  - Tigrcorn owns the HTTP/3 and QUIC runtime carrier.
  - Tigrbl owns binding projection onto WebTransport lanes.
  
  Forbidden claims:
  - WebTransport contract rows must not be used as WebSocket rows.
  - Plain HTTP/3 rows must not imply WebTransport lane support.
