body: |-
  Decision: tigr-asgi-contracts models WebSocket over HTTP/2 as a WebSocket session/message family bootstrapped by RFC 8441 Extended CONNECT over one HTTP/2 stream.
  
  Owned boundary:
  - The contract may classify this as a WebSocket scope with HTTP/2 carrier metadata.
  - The contract must keep WebSocket message/session events separate from generic HTTP/2 application streams.
  
  Peer inputs:
  - Tigrcorn owns RFC 8441 runtime behavior and evidence.
  - Tigrbl owns WebSocket binding legality and app projection.
  
  Forbidden claims:
  - WebSocket-over-H2 rows must not imply WebTransport lane support.
  - WebSocket-over-H2 rows must not become a generic H2 bidirectional stream abstraction.
