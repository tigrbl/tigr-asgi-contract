body: |-
  Decision: tigr-asgi-contracts models WebSocket over HTTP/3 as a WebSocket session/message family bootstrapped by RFC 9220 Extended CONNECT over one HTTP/3 stream.
  
  Owned boundary:
  - The contract may classify this as a WebSocket scope with HTTP/3 carrier metadata.
  - The contract must keep WebSocket message/session events separate from WebTransport session, stream, and datagram events.
  
  Peer inputs:
  - Tigrcorn owns RFC 9220 runtime behavior and evidence.
  - Tigrbl owns WebSocket binding legality and app projection.
  
  Forbidden claims:
  - WebSocket-over-H3 rows must not imply WebTransport support.
  - WebSocket-over-H3 rows must not be modeled as WebTransport-over-H3 or as a combined WT/WS stack.
