body: |-
  Decision: tigr-asgi-contracts models HTTP/2 streams as multiplexed HTTP request and push carriers with explicit stream identity, while keeping application events separate from runtime flow-control mechanics.
  
  Owned boundary:
  - The contract may expose HTTP/2 stream identity, request stream, push stream, half-close, reset, and lifecycle classification metadata.
  - The contract must keep HTTP/2 stream semantics distinct from WebSocket, WebTransport, and QUIC stream semantics.
  
  Peer inputs:
  - Tigrcorn owns HTTP/2 stream ID allocation, parser/runtime lifecycle, and flow-control behavior.
  - Tigrbl owns binding legality and app projection onto HTTP/2-capable carriers.
  
  Forbidden claims:
  - Contract rows must not treat HTTP/2 push as client bidirectional application streams.
  - Contract rows must not import QUIC or WebTransport stream-ID bit semantics into HTTP/2.
