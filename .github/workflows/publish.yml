name: Release / Publish Artifacts
run-name: Release / Publish Artifacts / ${{ inputs.rc_tag }}

on:
  workflow_call:
    inputs:
      rc_tag:
        description: Promoted release tag to publish from
        required: true
        type: string
      release_ref:
        description: Commit ref containing the promoted release package versions
        required: false
        default: ''
        type: string
      create_github_release:
        description: Create a GitHub release for the promoted version
        required: false
        default: true
        type: boolean
      force_prerelease:
        description: Mark the final GitHub release as a prerelease regardless of version suffix
        required: false
        default: false
        type: boolean
      npm_release_count:
        description: Number of recent release bundles to publish to npm
        required: false
        default: '1'
        type: string
      publish_to_pypi:
        description: Publish Python distributions to PyPI
        required: false
        default: true
        type: boolean
      publish_to_npmjs:
        description: Publish npm distributions to npmjs
        required: false
        default: true
        type: boolean
      publish_to_crates:
        description: Publish Rust crates to crates.io
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      rc_tag:
        description: Promoted release tag to publish from
        required: true
      release_ref:
        description: Commit ref containing the promoted release package versions
        required: false
        default: ''
      create_github_release:
        description: Create a GitHub release for the promoted version
        required: true
        default: true
        type: boolean
      force_prerelease:
        description: Mark the final GitHub release as a prerelease regardless of version suffix
        required: true
        default: false
        type: boolean
      npm_release_count:
        description: Number of recent release bundles to publish to npm
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      publish_to_pypi:
        description: Publish Python distributions to PyPI
        required: true
        default: true
        type: boolean
      publish_to_npmjs:
        description: Publish npm distributions to npmjs
        required: true
        default: true
        type: boolean
      publish_to_crates:
        description: Publish Rust crates to crates.io
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-and-release-${{ inputs.rc_tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish-pypi:
    name: Publish Python distributions
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_pypi }}
    steps:
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - uses: astral-sh/setup-uv@v7
      - name: Select PyPI distributions
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -rf dist/pypi
          mkdir -p dist/pypi/tigr-asgi-contract dist/pypi/tigr-asgi-contract-artifacts
          artifacts=(dist/promoted/*.whl dist/promoted/*.tar.gz)
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "No PyPI distributions found in promoted assets."
            exit 1
          fi
          contract_count=0
          artifacts_count=0
          for artifact in "${artifacts[@]}"; do
            filename="$(basename "$artifact")"
            case "$filename" in
              tigr_asgi_contract_artifacts-*|tigr-asgi-contract-artifacts-*)
                cp "$artifact" dist/pypi/tigr-asgi-contract-artifacts/
                artifacts_count=$((artifacts_count + 1))
                ;;
              tigr_asgi_contract-*|tigr-asgi-contract-*)
                cp "$artifact" dist/pypi/tigr-asgi-contract/
                contract_count=$((contract_count + 1))
                ;;
              *)
                echo "Unexpected PyPI distribution asset: $filename"
                exit 1
                ;;
            esac
          done
          if [[ "$contract_count" -eq 0 ]]; then
            echo "No tigr-asgi-contract PyPI distributions found."
            exit 1
          fi
          if [[ "$artifacts_count" -eq 0 ]]; then
            echo "No tigr-asgi-contract-artifacts PyPI distributions found."
            exit 1
          fi
      - name: Publish tigr-asgi-contract with trusted publishing
        uses: cobycloud/actions/actions/pypi-publish@main
        with:
          publish-mode: trusted
          packages-dir: dist/pypi/tigr-asgi-contract
          skip-existing: "true"
      - name: Publish tigr-asgi-contract-artifacts with trusted publishing
        uses: cobycloud/actions/actions/pypi-publish@main
        with:
          publish-mode: trusted
          packages-dir: dist/pypi/tigr-asgi-contract-artifacts
          skip-existing: "true"

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_npmjs }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_ref != '' && inputs.release_ref || github.ref_name }}
      - name: Publish @tigrbljs/tigr-asgi-contract with trusted publishing
        uses: cobycloud/actions/actions/npm-publish@main
        with:
          publish-mode: auto
          npm-api-token: ${{ secrets.NPM_API_TOKEN }}
          node-version: '25'
          package-directory: packages/contract-npm
          cache-dependency-path: package-lock.json
          install-command: ''
          access: public
          provenance: 'true'
          skip-existing: 'true'
      - name: Publish @tigrbljs/tigr-asgi-contract-artifacts with trusted publishing
        uses: cobycloud/actions/actions/npm-publish@main
        with:
          publish-mode: auto
          npm-api-token: ${{ secrets.NPM_API_TOKEN }}
          node-version: '25'
          package-directory: packages/artifacts-npm
          cache-dependency-path: package-lock.json
          install-command: ''
          access: public
          provenance: 'true'
          skip-existing: 'true'

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_crates }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python 3.10
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          git checkout "$target_commit"
      - run: uv run --frozen python tools/check_versions.py
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
      - run: uv run --no-project --python 3.10 python packages/artifacts-rs/scripts/vendor_contract.py
      - name: Publish tigr_asgi_contract_artifacts_rs
        uses: cobycloud/actions/actions/crates-publish@main
        with:
          publish-mode: token
          working-directory: packages/artifacts-rs
          crates-api-token: ${{ secrets.CRATES_API_TOKEN }}
          allow-dirty: 'true'
          no-verify: 'true'
          skip-existing: 'true'
      - name: Publish tigr_asgi_contract_rs
        uses: cobycloud/actions/actions/crates-publish@main
        with:
          publish-mode: token
          working-directory: packages/contract-rs
          crates-api-token: ${{ secrets.CRATES_API_TOKEN }}
          allow-dirty: 'true'
          no-verify: 'true'
          skip-existing: 'true'
      - run: rm -rf packages/artifacts-rs/contract

  finalize-release:
    name: Finalize GitHub release
    needs: [publish-pypi, publish-npm, publish-crates]
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.create_github_release && contains(fromJSON('["success","skipped"]'), needs.publish-pypi.result) && contains(fromJSON('["success","skipped"]'), needs.publish-npm.result) && contains(fromJSON('["success","skipped"]'), needs.publish-crates.result) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - name: Finalize GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          version=$(tr -d '\r\n' < dist/promoted/VERSION)
          final_tag="tigr-asgi-contracts==${version}"
          title="Release $final_tag"
          notes="Published from promoted release candidate ${{ inputs.rc_tag }}."
          if ! git ls-remote --tags origin "$final_tag" | grep -q "$final_tag"; then
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git fetch --tags
            git tag "$final_tag" "$target_commit"
            git push origin "$final_tag"
          fi
          extra_args=(--latest)
          edit_args=(--prerelease=false)
          if [[ "${{ inputs.force_prerelease }}" == 'true' || "$version" == *"-dev"* ]]; then
            extra_args+=(--prerelease)
            edit_args=(--prerelease)
          fi
          if gh release view "$final_tag" >/dev/null 2>&1; then
            gh release edit "$final_tag" \
              --target "$target_commit" \
              --title "$title" \
              --notes "$notes" \
              "${edit_args[@]}"
            if ! gh release upload "$final_tag" dist/promoted/* --clobber; then
              echo "::warning::Existing release assets could not be replaced; keeping current immutable release assets."
            fi
          else
            gh release create "$final_tag" \
              dist/promoted/* \
              --target "$target_commit" \
              --title "$title" \
              --notes "$notes" \
              "${extra_args[@]}"
          fi
