body: |-
  This SPEC defines channel_lifecycle states initialized, opening, open, read_closed, write_closed, closing, closed, failed, and lost. It defines legal transitions, lifecycle events, readable and writable capability effects, terminal states, and cross-domain compatibility rules. It also defines the RFC target projection map for HTTP/2 RFC 9113 sections 5.1, 5.2, 6.4, and 6.8, HTTP/3 RFC 9114 sections 4.1, 4.1.1, 5.2, and 6.1, QUIC RFC 9000 sections 3, 3.5, 10, 19.4, and 19.5, plus WebSocket tunnel mappings from RFC 8441 and RFC 9220 when applicable. read_closed does not imply failure. write_closed constrains completion. failed and lost may produce disconnect and cancellation observations.
