body: |-
  Decision: tigr-asgi-contracts models WebTransport over HTTP/2 as a separate draft-target fallback family with capsule-carrier constraints, not as QUIC-native WebTransport.
  
  Owned boundary:
  - The contract may identify WebTransport-over-H2 capability and event shapes separately from WebTransport-over-H3.
  - The contract must preserve fallback-carrier status and avoid QUIC-native stream-ID assumptions.
  
  Peer inputs:
  - Tigrcorn owns the HTTP/2 capsule/fallback runtime behavior.
  - Tigrbl owns capability-gated binding projection.
  
  Forbidden claims:
  - WebTransport-over-H2 rows must not claim QUIC datagram or QUIC stream-ID behavior.
  - WebTransport-over-H2 rows must not be flattened into WebTransport-over-H3 certification claims.
